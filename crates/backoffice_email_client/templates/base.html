<!DOCTYPE html>
<html
  lang="und"
  dir="auto"
  xmlns="http://www.w3.org/1999/xhtml"
  xmlns:v="urn:schemas-microsoft-com:vml"
  xmlns:o="urn:schemas-microsoft-com:office:office"
>
  <head>
    <title>{% block title %}Mangoverse{% endblock %}</title>
    <!--[if !mso]><!-->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <!--<![endif]-->
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style type="text/css">
      #outlook a,
      body {
        padding: 0;
      }
      body {
        margin: 0;
        -webkit-text-size-adjust: 100%;
        -ms-text-size-adjust: 100%;
      }
      table,
      td {
        border-collapse: collapse;
        mso-table-lspace: 0;
        mso-table-rspace: 0;
      }
      img {
        border: 0;
        height: auto;
        line-height: 100%;
        outline: none;
        text-decoration: none;
        -ms-interpolation-mode: bicubic;
      }
      p {
        display: block;
        margin: 13px 0;
      }
    </style>
    <!--[if mso]>
      <noscript>
        <xml>
          <o:OfficeDocumentSettings>
            <o:AllowPNG />
            <o:PixelsPerInch>96</o:PixelsPerInch>
          </o:OfficeDocumentSettings>
        </xml>
      </noscript>
    <![endif]-->
    <!--[if lte mso 11]>
      <style type="text/css">
        .mj-outlook-group-fix {
          width: 100% !important;
        }
      </style>
    <![endif]-->
    <style type="text/css">
      @media only screen and (min-width: 480px) {
        .mj-column-per-100 {
          max-width: 100%;
          width: 100% !important;
        }
      }
    </style>
    <style media="screen and (min-width:480px)">
      .moz-text-html .mj-column-per-100 {
        max-width: 100%;
        width: 100% !important;
      }
    </style>
  </head>
  <body style="background-color: #f4f4f4; word-spacing: normal">
    <div style="background-color: #f4f4f4" lang="und" dir="auto">
      <!--[if mso | IE]><table align="center" border="0" cellpadding="0" cellspacing="0" class="" role="presentation" style="width:600px;" width="600" bgcolor="#ffffff"><tr><td style="line-height:0px;font-size:0px;mso-line-height-rule:exactly;"><![endif]-->
      <div
        style="
          background: #fff;
          background-color: #fff;
          margin: 0 auto;
          max-width: 600px;
        "
      >
        <!-- HEADER -->
        <table
          align="center"
          border="0"
          cellpadding="0"
          cellspacing="0"
          role="presentation"
          style="width: 100%"
        >
          <tbody>
            <tr>
              <td
                style="
                  background-color: #00b87a;
                  padding: 24px 32px;
                  text-align: left;
                "
              >
                <span
                  style="
                    color: #ffffff;
                    font-family: Arial, sans-serif;
                    font-size: 22px;
                    font-weight: bold;
                    letter-spacing: 1px;
                    text-decoration: none;
                  "
                >mangoverse</span>
              </td>
            </tr>
          </tbody>
        </table>

        <!-- CONTENT -->
        <table
          align="center"
          border="0"
          cellpadding="0"
          cellspacing="0"
          role="presentation"
          style="background: #fff; background-color: #fff; width: 100%"
        >
          <tbody>
            <tr>
              <td
                style="
                  direction: ltr;
                  font-size: 0;
                  padding: 32px 0 24px;
                  text-align: center;
                "
              >
                <!--[if mso | IE]><table role="presentation" border="0" cellpadding="0" cellspacing="0"><tr><td class="" style="vertical-align:top;width:600px;"><![endif]-->
                <div
                  class="mj-column-per-100 mj-outlook-group-fix"
                  style="
                    direction: ltr;
                    display: inline-block;
                    font-size: 0;
                    text-align: left;
                    vertical-align: top;
                    width: 100%;
                  "
                >
                  <table
                    border="0"
                    cellpadding="0"
                    cellspacing="0"
                    role="presentation"
                    style="vertical-align: top"
                    width="100%"
                  >
                    <tbody>
                      <tr>
                        <td
                          align="left"
                          style="
                            font-size: 0;
                            padding: 0 32px;
                            word-break: break-word;
                          "
                        >
                          <div
                            style="
                              color: #55575d;
                              font-family: Arial, sans-serif;
                              font-size: 15px;
                              line-height: 26px;
                              text-align: left;
                            "
                          >
                            {% block content %}
                            <p>Placeholder content</p>
                            {% endblock %}
                          </div>
                        </td>
                      </tr>
                    </tbody>
                  </table>
                </div>
                <!--[if mso | IE]></td></tr></table><![endif]-->
              </td>
            </tr>
          </tbody>
        </table>

        <!-- FOOTER -->
        <table
          align="center"
          border="0"
          cellpadding="0"
          cellspacing="0"
          role="presentation"
          style="width: 100%; border-top: 1px solid #e8e8e8"
        >
          <tbody>
            <tr>
              <td
                style="
                  padding: 24px 32px;
                  background-color: #f9f9f9;
                  text-align: center;
                "
              >
                <p
                  style="
                    margin: 0 0 8px;
                    font-family: Arial, sans-serif;
                    font-size: 12px;
                    color: #999999;
                    line-height: 18px;
                  "
                >
                  You're receiving this email because you have an account with Mangoverse.
                </p>
                <p
                  style="
                    margin: 0 0 8px;
                    font-family: Arial, sans-serif;
                    font-size: 12px;
                    color: #999999;
                    line-height: 18px;
                  "
                >
                  Need help? Contact us at
                  <a
                    href="mailto:support@mangoverse.app"
                    style="color: #00b87a; text-decoration: none"
                    >support@mangoverse.app</a
                  >
                </p>
                <p
                  style="
                    margin: 0;
                    font-family: Arial, sans-serif;
                    font-size: 12px;
                    color: #bbbbbb;
                    line-height: 18px;
                  "
                >
                  &copy; 2026 Mangoverse. All rights reserved.
                </p>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
      <!--[if mso | IE]></td></tr></table><![endif]-->
    </div>
  </body>
</html>
